name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - feat/*
    tags:
      - 'v*'
    # 路径过滤：如果只修改了文档或 k8s 配置，不触发构建
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'doc/**'
      - 'k8s/**'
  pull_request:
    branches:
      - main
    # PR 同样忽略无关文件
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'doc/**'
      - 'k8s/**'
  # 手动触发
  workflow_dispatch:
    inputs:
      reason:
        description: "触发原因（可选）"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # test: ...

  build-and-push:
    runs-on: ubuntu-latest
    # 动态判断是否需要 Push (只有在非 PR 情况下才 Push)
    env:
      SHOULD_PUSH: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        # 只有需要 Push 的时候才登录，保护凭证
        if: ${{ env.SHOULD_PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API Server 镜像处理 ---
      - name: Extract metadata for API Server
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr

      - name: Build and push API Server
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api-server
          push: ${{ env.SHOULD_PUSH == 'true' }}
          # 正确使用 metadata-action 生成的动态 tags 和 labels
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          # 添加 scope 防止与 worker 互相覆盖缓存
          cache-from: type=gha,scope=api-server
          cache-to: type=gha,mode=max,scope=api-server

      # --- Worker 镜像处理 ---
      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          # 独立的缓存作用域
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
