name: cloud-media

services:
  # 对象存储
  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: media-minio
    networks:
      - media-internal
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: rootadmin
      MINIO_ROOT_PASSWORD: rootpassword
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: media-rabbitmq
    networks:
      - media-internal
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 数据库
  postgres:
    image: postgres:17-alpine
    container_name: media-postgres
    networks:
      - media-internal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: media-db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  rabbitmq_data:
  postgres_data:

networks:
  media-internal:
    driver: bridge
    name: media_internal
