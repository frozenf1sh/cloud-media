name: cloud-media

services:
  # 对象存储
  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: media-minio
    networks:
      - media-internal
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: rootadmin
      MINIO_ROOT_PASSWORD: rootpassword
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: media-rabbitmq
    networks:
      - media-internal
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 数据库
  postgres:
    image: postgres:17-alpine
    container_name: media-postgres
    networks:
      - media-internal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: media-db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Loki: 日志系统
  loki:
    image: grafana/loki:3.0.0
    container_name: media-loki
    user: root
    ports:
      - "3100:3100"
    volumes:
      # 映射配置文件
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      # 持久化日志数据
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - media-internal

  # Promtail: 采集 Docker 原始日志并发送给 Loki
  promtail:
    image: grafana/promtail:3.0.0
    container_name: media-promtail
    user: root  # 确保有权读取宿主机日志文件
    volumes:
      # 映射宿主机的 Docker 日志目录（只读）
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # 映射 Promtail 的配置文件
      - ./promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - media-internal
    depends_on:
      - loki

  # Tempo: 分布式追踪系统
  tempo:
    image: grafana/tempo:2.5.0
    container_name: media-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "14268:14268"   # jaeger ingest
      - "3200:3200"    # tempo
      - "4317:4317"    # otlp grpc
      - "4318:4318"    # otlp http
      - "9411:9411"    # zipkin
    networks:
      - media-internal

  # Grafana: 界面展示
  grafana:
    image: grafana/grafana:latest
    container_name: media-grafana
    ports:
      - "3000:3000"
    volumes:
      # 持久化配置、插件和仪表盘
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: password
      GF_SECURITY_ADMIN_USER: admin
    networks:
      - media-internal
    depends_on:
      - loki
      - tempo

  # API Server
  api-server:
    image: cloud-media-api-server:latest
    container_name: media-api-server
    networks:
      - media-internal
    ports:
      - "8080:8080"
    volumes:
      - ./config.docker.yaml:/app/config.yaml
    environment:
      - CLOUD_MEDIA_SERVER_HOST=0.0.0.0
      - CLOUD_MEDIA_SERVER_PORT=8080
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Worker
  worker:
    image: cloud-media-worker:latest
    container_name: media-worker
    networks:
      - media-internal
    volumes:
      - ./config.docker.yaml:/app/config.yaml
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  minio_data:
  rabbitmq_data:
  postgres_data:
  loki_data:
  grafana_data:
  tempo_data:

networks:
  media-internal:
    driver: bridge
    name: media_internal
