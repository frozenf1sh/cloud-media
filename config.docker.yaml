# Cloud Media Docker 配置文件
# 用于 docker-compose 环境

server:
  host: 0.0.0.0
  port: 8080

log:
  level: debug  # debug, info, warn, error
  format: json

database:
  host: postgres
  port: 5432
  user: postgres
  password: password
  dbname: media-db
  sslmode: disable

rabbitmq:
  url: amqp://guest:guest@rabbitmq:5672/

# 对象存储配置（支持 MinIO、AWS S3、Cloudflare R2）
object_storage:
  type: minio
  internal_endpoint: minio:9000
  internal_use_ssl: false
  external_endpoint: localhost:9000
  external_use_ssl: false
  access_key_id: rootadmin
  secret_access_key: rootpassword
  region: us-east-1

  # CDN 配置（可选）
  cdn:
    enabled: false
    base_url: ""

# 兼容性配置（保留旧格式）
minio:
  internal_endpoint: minio:9000
  internal_use_ssl: false
  external_endpoint: localhost:9000
  external_use_ssl: false
  access_key_id: rootadmin
  secret_access_key: rootpassword

observability:
  service_name: cloud-media
  service_version: 1.0.0

  metrics:
    enabled: true
    path: /metrics
    port: 9090

  tracing:
    enabled: true
    exporter: otlp           # otlp, stdout, none
    otlp_endpoint: tempo:4317
    sampler: always_on      # always_on, always_off, traceidratio
    sampler_ratio: 1.0
