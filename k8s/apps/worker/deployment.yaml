
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cloud-media
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      terminationGracePeriodSeconds: 3600  # 1 小时最大等待时间（一般视频不需要2小时）
      containers:
        - name: worker
          image: ghcr.io/frozenf1sh/cloud-media-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              protocol: TCP
              containerPort: 8080
          env:
            # 通过环境变量覆盖 service_name
            - name: CLOUD_MEDIA_OBSERVABILITY_SERVICE_NAME
              value: "cloud-media-worker"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: prestop-script
              mountPath: /scripts/prestop.sh
              subPath: prestop.sh
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          lifecycle:
            preStop:
              exec:
                # preStop hook: 检查 /status 端点，等待活动任务完成或超时
                command: ["/bin/sh", "/scripts/prestop.sh"]
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: config-volume
          configMap:
            name: cloud-media-common-config
        - name: prestop-script
          configMap:
            name: worker-prestop-script
            defaultMode: 0755

