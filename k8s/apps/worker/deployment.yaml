
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cloud-media
  labels:
    app: worker
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 3600
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - fish-ubuntu
      tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 3600
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 3600
      containers:
        - name: worker
          image: ghcr.io/frozenf1sh/cloud-media-worker:pr-15
          imagePullPolicy: Always
          ports:
            - name: http
              protocol: TCP
              containerPort: 8080
          env:
            # 通过环境变量覆盖 service_name
            - name: CLOUD_MEDIA_OBSERVABILITY_SERVICE_NAME
              value: "cloud-media-worker"
            # 从 Secret 读取数据库凭证
            - name: CLOUD_MEDIA_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_DATABASE_USER
            - name: CLOUD_MEDIA_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_DATABASE_PASSWORD
            # 从 Secret 读取 RabbitMQ 连接串
            - name: CLOUD_MEDIA_RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_RABBITMQ_URL
            # 从 Secret 读取对象存储凭证
            - name: CLOUD_MEDIA_OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_OBJECT_STORAGE_ACCESS_KEY_ID
            - name: CLOUD_MEDIA_OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_OBJECT_STORAGE_SECRET_ACCESS_KEY
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: prestop-script
              mountPath: /scripts/prestop.sh
              subPath: prestop.sh
          resources:
            requests:
              memory: "800Mi"
              cpu: "2000m"
            limits:
              memory: "800Mi"
              cpu: "2000m"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "/scripts/prestop.sh"]
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: cloud-media-common-config
        - name: prestop-script
          configMap:
            name: worker-prestop-script
            defaultMode: 0755

