
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: cloud-media
  labels:
    app: api-server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      # 重启策略：始终重启
      restartPolicy: Always
      # Pod 反亲和性：确保 api-server Pod 分散在不同节点
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - api-server
            topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      # 容忍度：允许调度到有污点的节点
      tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      containers:
        - name: api-server
          image: ghcr.io/frozenf1sh/cloud-media-api-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              protocol: TCP
              containerPort: 8080
          env:
            # 通过环境变量覆盖 service_name
            - name: CLOUD_MEDIA_OBSERVABILITY_SERVICE_NAME
              value: "cloud-media-api-server"
            # 从 Secret 读取数据库凭证
            - name: CLOUD_MEDIA_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_DATABASE_USER
            - name: CLOUD_MEDIA_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_DATABASE_PASSWORD
            # 从 Secret 读取 RabbitMQ 连接串
            - name: CLOUD_MEDIA_RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_RABBITMQ_URL
            # 从 Secret 读取对象存储凭证
            - name: CLOUD_MEDIA_OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_OBJECT_STORAGE_ACCESS_KEY_ID
            - name: CLOUD_MEDIA_OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-media-secret
                  key: CLOUD_MEDIA_OBJECT_STORAGE_SECRET_ACCESS_KEY
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
            failureThreshold: 30
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 3
      volumes:
        - name: config-volume
          configMap:
            name: cloud-media-common-config

