---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minio-credentials
  namespace: cloud-media
spec:
  encryptedData:
    MINIO_ACCESS_KEY_ID: 
    MINIO_SECRET_ACCESS_KEY: 
  template:
    metadata:
      name: minio-credentials
      namespace: cloud-media
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-credentials
  namespace: cloud-media
spec:
  encryptedData:
    GF_SECURITY_ADMIN_PASSWORD: 
    GF_SECURITY_ADMIN_USER: 
  template:
    metadata:
      name: grafana-credentials
      namespace: cloud-media
    type: Opaque
