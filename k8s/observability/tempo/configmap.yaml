
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: cloud-media
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1000000
      max_block_duration: 5m
      complete_block_timeout: 1m

    compactor:
      compaction:
        compaction_window: 1h
        max_block_bytes: 100000
        block_retention: 48h
        compacted_block_retention: 1h

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks
        wal:
          path: /tmp/tempo/wal

