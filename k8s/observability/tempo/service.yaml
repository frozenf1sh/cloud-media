
apiVersion: v1
kind: Service
metadata:
  name: tempo-service
  namespace: cloud-media
spec:
  selector:
    app: tempo
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
    - name: zipkin
      protocol: TCP
      port: 9411
      targetPort: 9411
