
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-gateway-config
  namespace: cloud-media
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      batch:
        send_batch_size: 8192
        timeout: 200ms
      resource:
        attributes:
          - action: insert
            key: k8s.cluster.name
            value: cloud-media-cluster

    exporters:
      otlp:
        endpoint: tempo-service:4317
        tls:
          insecure: true

      otlphttp/mimir:
        endpoint: http://mimir-service:8080/otlp
        tls:
          insecure: true

      loki:
        endpoint: http://loki-service:3100/loki/api/v1/push
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: info
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [loki]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp/mimir]
