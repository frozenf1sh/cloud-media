
apiVersion: v1
kind: Service
metadata:
  name: mimir-service
  namespace: cloud-media
spec:
  selector:
    app: mimir
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: memberlist
      protocol: TCP
      port: 7946
      targetPort: 7946
