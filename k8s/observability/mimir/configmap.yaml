
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: cloud-media
data:
  mimir.yaml: |
    target: all,alertmanager

    multitenancy_enabled: false

    server:
      http_listen_port: 8080
      log_level: info

    limits:
      max_global_series_per_user: 0
      ingestion_rate: 100000
      ingestion_burst_size: 1000000
      max_label_name_length: 1024
      max_label_value_length: 2048

    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks
      tsdb:
        dir: /data/tsdb
      bucket_store:
        sync_dir: /data/tsdb-sync

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/ruler

    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/alertmanager

    memberlist:
      bind_port: 7946

    ingester:
      ring:
        replication_factor: 1
        final_sleep: 0s

