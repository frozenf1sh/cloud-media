
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaledobject
  namespace: cloud-media
spec:
  scaleTargetRef:
    name: worker
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 0            # 允许缩容到 0（空闲时节省资源）
  maxReplicaCount: 10
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0 # 扩容要快
          policies:
          - type: Pods
            value: 5
            periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300 # 稳定缩容
          selectPolicy: Min
          policies:
          - type: Pods
            value: 1
            periodSeconds: 60
  triggers:
    # RabbitMQ 队列长度触发器
    - type: rabbitmq
      metadata:
        mode: QueueLength               # 明确使用长度模式
        queueName: video_transcode_tasks
        queueLength: "1"
        activationQueueLength: "1"
        vhostName: "/"
        includeUnacked: "true"  # 同时考虑 unacked 消息（KEDA 2.10+）
      authenticationRef:
        name: rabbitmq-trigger-auth
