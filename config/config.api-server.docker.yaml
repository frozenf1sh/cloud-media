# Cloud Media API Server Docker 环境配置

server:
  host: 0.0.0.0
  port: 8080

log:
  level: info
  format: json

database:
  host: postgres
  port: 5432
  user: postgres
  password: password
  dbname: media-db
  sslmode: disable

rabbitmq:
  url: amqp://guest:guest@rabbitmq:5672/

object_storage:
  type: minio
  internal_endpoint: minio:9000
  internal_use_ssl: false
  external_endpoint: localhost:9000
  external_use_ssl: false
  access_key_id: rootadmin
  secret_access_key: rootpassword
  region: us-east-1
  cdn:
    enabled: false
    base_url: ""

# ============================================
# Cloudflare R2 配置示例（取消注释使用）
# ============================================
# object_storage:
#   type: r2
#   internal_endpoint: <account_id>.r2.cloudflarestorage.com
#   internal_use_ssl: true
#   external_endpoint: <account_id>.r2.cloudflarestorage.com
#   external_use_ssl: true
#   access_key_id: <your_access_key_id>
#   secret_access_key: <your_secret_access_key>
#   region: auto
#   cdn:
#     enabled: true
#     base_url: "https://media.yourdomain.com"

observability:
  service_name: cloud-media-api-server
  service_version: 1.0.0
  metrics:
    enabled: true
    path: /metrics
    port: 9090
  tracing:
    enabled: true
    exporter: otlp
    otlp_endpoint: tempo:4317
    sampler: always_on
    sampler_ratio: 1.0
