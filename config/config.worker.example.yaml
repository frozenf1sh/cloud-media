# Cloud Media Worker 配置文件
# 复制为 config.worker.yaml 并根据实际情况修改

server:
  host: 0.0.0.0
  port: 9090  # Worker 使用 9090 端口提供健康检查和 metrics

log:
  level: info  # debug, info, warn, error
  format: json # json, text

database:
  host: localhost
  port: 5432
  user: postgres
  password: password
  dbname: media-db
  sslmode: disable

rabbitmq:
  url: amqp://guest:guest@localhost:5672/

# 对象存储配置（支持 MinIO、AWS S3、Cloudflare R2）
# type: minio, s3, r2
object_storage:
  type: minio
  internal_endpoint: localhost:9000
  internal_use_ssl: false
  external_endpoint: localhost:9000
  external_use_ssl: false
  access_key_id: rootadmin
  secret_access_key: rootpassword
  region: us-east-1  # R2 使用 "auto"

  # CDN 配置（可选）
  cdn:
    enabled: false
    base_url: "https://cdn.example.com"
    # url_signing_secret: ""  # 用于 CDN URL 签名（可选）

# ============================================
# Cloudflare R2 配置示例（取消注释使用）
# ============================================
# object_storage:
#   type: r2
#   # R2 Endpoint 格式: https://<account_id>.r2.cloudflarestorage.com
#   internal_endpoint: <account_id>.r2.cloudflarestorage.com
#   internal_use_ssl: true
#   external_endpoint: <account_id>.r2.cloudflarestorage.com
#   external_use_ssl: true
#   access_key_id: <your_access_key_id>
#   secret_access_key: <your_secret_access_key>
#   region: auto  # R2 固定使用 "auto"
#   cdn:
#     enabled: true
#     base_url: "https://media.yourdomain.com"

# 转码器配置
transcoder:
  # 输出存储桶
  output_bucket: "media-output"
  # HLS 分片时长（秒）
  hls_time: 6
  # 视频编码器
  video_codec: "libx264"
  # 音频编码器
  audio_codec: "aac"
  # 音频码率
  audio_bitrate: "128k"
  # 编码预设（ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow）
  preset: "fast"
  # 关键帧间隔（帧数）
  gop_size: 48
  # 封面最大尺寸
  thumbnail_size: 1080
  # 超时倍数（视频时长 × 此倍数）
  timeout_multiplier: 3.0
  # 最小超时时间（分钟）
  min_timeout: 10
  # 最大超时时间（分钟）
  max_timeout: 120
  # 多码率变体配置
  variants:
    - name: "1080p"
      target_size: 1080
      bitrate: "4000k"
      bandwidth: 4000000
    - name: "720p"
      target_size: 720
      bitrate: "2000k"
      bandwidth: 2000000
    - name: "480p"
      target_size: 480
      bitrate: "1000k"
      bandwidth: 1000000

# 兼容性配置（保留旧格式，会被 object_storage 覆盖）
minio:
  internal_endpoint: localhost:9000
  internal_use_ssl: false
  external_endpoint: localhost:9000
  external_use_ssl: false
  access_key_id: rootadmin
  secret_access_key: rootpassword

observability:
  service_name: cloud-media-worker
  service_version: 1.0.0

  metrics:
    enabled: true
    path: /metrics
    port: 9090  # Worker 的健康检查和 metrics 使用同一端口

  tracing:
    enabled: true
    exporter: otlp           # otlp, stdout, none
    otlp_endpoint: localhost:4317
    sampler: always_on      # always_on, always_off, traceidratio
    sampler_ratio: 1.0
