# Cloud Media Cloudflare R2 配置文件示例
# 复制为 config.yaml 并根据实际情况修改

server:
  host: 0.0.0.0
  port: 8080

log:
  level: info  # debug, info, warn, error
  format: json # json, text

database:
  host: localhost
  port: 5432
  user: postgres
  password: password
  dbname: media-db
  sslmode: disable

rabbitmq:
  url: amqp://guest:guest@localhost:5672/

# Cloudflare R2 对象存储配置
# 获取凭证: https://dash.cloudflare.com/?account=r2
object_storage:
  # 存储类型: minio, s3, r2
  type: r2

  # R2 Endpoint 格式: https://<account_id>.r2.cloudflarestorage.com
  # 从 Cloudflare Dashboard -> R2 -> 获取 Account ID
  internal_endpoint: <account_id>.r2.cloudflarestorage.com
  internal_use_ssl: true

  # 外网 Endpoint (与内网相同，R2 不区分内外网)
  external_endpoint: <account_id>.r2.cloudflarestorage.com
  external_use_ssl: true

  # R2 API Token
  # 创建方式: Cloudflare Dashboard -> R2 -> Manage R2 API Tokens
  # 权限需要: Object Read & Write
  access_key_id: <your_access_key_id>
  secret_access_key: <your_secret_access_key>

  # R2 Region 固定为 "auto"
  region: auto

  # CDN 配置 (可选)
  # 建议通过 Cloudflare CDN 加速访问
  cdn:
    enabled: true
    # 你的自定义域名，已在 Cloudflare 中配置并绑定到 R2 桶
    base_url: "https://media.yourdomain.com"
    # CDN URL 签名密钥 (可选，用于私有内容)
    # url_signing_secret: ""

# 兼容性配置（保留旧格式，会被 object_storage 覆盖）
minio:
  internal_endpoint: localhost:9000
  internal_use_ssl: false
  external_endpoint: localhost:9000
  external_use_ssl: false
  access_key_id: rootadmin
  secret_access_key: rootpassword

observability:
  service_name: cloud-media
  service_version: 1.0.0

  metrics:
    enabled: true
    path: /metrics
    port: 9090

  tracing:
    enabled: true
    exporter: otlp
    otlp_endpoint: localhost:4317
    sampler: always_on
    sampler_ratio: 1.0

# ============================================
# Cloudflare R2 配置指南
# ============================================
#
# 1. 创建 R2 存储桶
#    - 访问 https://dash.cloudflare.com/?account=r2
#    - 点击 "Create bucket"
#    - 输入桶名称，如 "media-input"、"media-output"
#
# 2. 创建 API Token
#    - 在 R2 页面点击 "Manage R2 API Tokens"
#    - 点击 "Create API Token"
#    - 权限选择: "Object Read & Write"
#    - 适用桶: 选择你创建的桶或"All buckets"
#    - 复制 Access Key ID 和 Secret Access Key
#
# 3. 获取 Account ID
#    - 在 Cloudflare Dashboard 右上角可以找到 Account ID
#    - 或在 R2 页面的 URL 中: https://dash.cloudflare.com/<account_id>/r2
#
# 4. 配置自定义域名 (CDN)
#    - 在 R2 桶设置中点击 "Connect Domain"
#    - 输入你的域名，如 "media.yourdomain.com"
#    - 根据提示在 Cloudflare DNS 中添加 CNAME 记录
#    - 等待 DNS 生效 (通常几分钟)
#
# 5. 注意事项
#    - R2 没有"区域"概念，region 固定用 "auto"
#    - R2 不区分内外网 Endpoint，两者配置相同
#    - R2 出口流量免费！建议通过 CDN 访问
#    - 预签名 URL 在 R2 中同样可用，但 CDN 更高效
